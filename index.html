<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Pollinations AI Fleet Forge v4.3 [NET]</title>
    <hta:application 
        id="pollinFleet"
        applicationname="PollinFleet"
        border="thin"
        innerborder="no"
        scroll="auto"
        singleinstance="yes"
        windowstate="normal"
    >
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap');
        
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #020617 70%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(51, 65, 85, 0.4);
        }

        .agent-card { 
            background: rgba(30, 41, 59, 0.3); 
            border: 1px solid rgba(71, 85, 105, 0.2);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .mode-btn {
            border: 1px solid rgba(71, 85, 105, 0.3);
            transition: all 0.2s ease;
        }
        .mode-btn.active {
            background: #3b82f6;
            border-color: #60a5fa;
            color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .thought-bubble {
            background: rgba(15, 23, 42, 0.9);
            border-left: 3px solid #3b82f6;
            font-family: 'Fira Code', monospace;
        }

        .code-view { font-family: 'Fira Code', monospace; }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .status-led { width: 10px; height: 10px; border-radius: 50%; }
        .led-active { background: #3b82f6; animation: pulse-glow 2s infinite; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-[1700px] mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-10 border-b border-slate-800/60 pb-8">
            <div>
                <h1 class="text-5xl font-black text-white tracking-tighter italic uppercase">
                    Neural<span class="text-blue-500">Forge</span>
                    <span class="text-xs not-italic font-mono ml-4 text-blue-400 bg-blue-950/50 px-3 py-1 rounded border border-blue-800">NET 4.3</span>
                </h1>
                <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] font-bold mt-2">Multi-Agent Collaborative Coding Engine</p>
            </div>
            <div id="globalStatus" class="text-right font-mono text-[11px] text-slate-500">
                STABILITY: <span class="text-emerald-400">OPTIMAL</span><br>
                ENDPOINT: <span class="text-blue-400">OPENAI (BRUTE)</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- Left Controls -->
            <div class="lg:col-span-3 space-y-6">
                <div class="glass-panel p-6 rounded-3xl">
                    <h2 class="text-xs font-black text-slate-400 mb-6 uppercase tracking-widest">Neural Mode</h2>
                    
                    <div class="grid grid-cols-2 gap-3 mb-8" id="modeSelector">
                        <button onclick="setMode('auto')" id="mode-auto" class="mode-btn active p-3 rounded-xl text-[10px] font-black uppercase">Auto</button>
                        <button onclick="setMode('fast')" id="mode-fast" class="mode-btn p-3 rounded-xl text-[10px] font-black uppercase">Fast</button>
                        <button onclick="setMode('deepx')" id="mode-deepx" class="mode-btn p-3 rounded-xl text-[10px] font-black uppercase">DeepX</button>
                        <button onclick="setMode('expert')" id="mode-expert" class="mode-btn p-3 rounded-xl text-[10px] font-black uppercase">Expert</button>
                        <button onclick="setMode('net43')" id="mode-net43" class="mode-btn p-3 rounded-xl text-[10px] font-black uppercase col-span-2 border-blue-500/50 text-blue-400">NET 4.3 (Best)</button>
                    </div>

                    <div class="space-y-6">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 mb-3 uppercase tracking-tighter">Objective Parameters</label>
                            <textarea id="promptInput" rows="8" 
                                class="w-full bg-slate-950/80 border border-slate-800 rounded-2xl p-4 text-sm text-slate-200 focus:border-blue-500 outline-none resize-none font-mono"
                                placeholder="Describe the application..."></textarea>
                        </div>

                        <button id="mainDeployBtn" onclick="window.deployForge()" 
                            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl transition-all text-xs uppercase tracking-widest shadow-xl shadow-blue-900/30">
                            Ignite Neural Net
                        </button>
                    </div>
                </div>

                <div class="glass-panel p-5 rounded-3xl">
                    <h3 class="text-[10px] font-bold text-slate-500 uppercase mb-4 tracking-widest">Thought Stream</h3>
                    <div id="systemLog" class="h-[350px] overflow-y-auto pr-2 space-y-3">
                        <div class="log-entry text-blue-400 text-[11px] font-mono italic">Waiting for command...</div>
                    </div>
                </div>
            </div>

            <!-- Main Display -->
            <div class="lg:col-span-9 space-y-8">
                <!-- Brainstorming View (Only for NET 4.3) -->
                <div id="brainstormingArea" class="hidden glass-panel p-8 rounded-[2rem] border-blue-500/20">
                    <h3 class="text-blue-400 font-black text-xs uppercase tracking-widest mb-6">Agent Collaboration Phase</h3>
                    <div id="thoughtGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <!-- Results Section -->
                <div id="verdictSection" class="hidden glass-panel border-amber-500/40 p-8 rounded-[2rem] relative overflow-hidden">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center gap-4">
                            <span class="text-amber-500 font-black text-sm uppercase tracking-[0.2em]">Validated Master Build</span>
                            <span id="winningUnitLabel" class="bg-amber-500 text-black text-[10px] px-4 py-1.5 rounded-full font-black uppercase">UNIT-001</span>
                        </div>
                        <button id="downloadWinnerBtn" class="bg-emerald-600 hover:bg-emerald-500 text-white text-[11px] px-8 py-3 rounded-2xl font-black uppercase transition-all shadow-lg shadow-emerald-900/20">
                            Download Source
                        </button>
                    </div>
                    <p id="verdictText" class="text-slate-300 text-sm leading-relaxed mb-0 italic border-l-2 border-slate-700 pl-4"></p>
                </div>

                <div id="fleetDisplay" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
                
                <div id="emptyState" class="flex flex-col items-center justify-center h-[500px] border-2 border-dashed border-slate-800/40 rounded-[3rem]">
                    <div class="w-16 h-16 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mb-6 opacity-20"></div>
                    <p class="text-xs font-bold uppercase tracking-[0.5em] text-slate-700">Cluster Idle</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const log = document.getElementById('systemLog');
        const fleetDisplay = document.getElementById('fleetDisplay');
        const emptyState = document.getElementById('emptyState');
        const verdictSection = document.getElementById('verdictSection');
        const mainDeployBtn = document.getElementById('mainDeployBtn');
        const thoughtGrid = document.getElementById('thoughtGrid');
        const brainstormingArea = document.getElementById('brainstormingArea');
        
        let winningCode = "";
        let currentMode = "auto";
        let isRunning = false;

        const personalities = [
            { id: 1, name: "ARCHITECT", persona: "Logic/HTML structure expert.", focus: "structural integrity" },
            { id: 2, name: "HACKER", persona: "Advanced JS logic & API expert.", focus: "dynamic functionality" },
            { id: 3, name: "ARTIST", persona: "CSS/UI animation & visual expert.", focus: "aesthetic excellence" },
            { id: 4, name: "ENGINEER", persona: "Security & clean code expert.", focus: "performance optimization" },
            { id: 5, name: "ANALYST", persona: "UX/UI flow & navigation expert.", focus: "user experience" },
            { id: 6, name: "MASTER", persona: "Full-stack synthesis expert.", focus: "complete integration" }
        ];

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`mode-${mode}`).classList.add('active');
        }

        function writeLog(msg, color = "text-slate-500") {
            const div = document.createElement('div');
            div.className = `log-entry ${color} border-l-2 border-slate-800 pl-3 py-1 font-mono text-[10px]`;
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.prepend(div);
        }

        async function fetchWithBruteRetry(payload, label) {
            let retries = 5;
            for (let i = 0; i < retries; i++) {
                try {
                    // Refined endpoint with cache-busting seed
                    const seed = Math.floor(Math.random() * 9999999);
                    const url = `https://text.pollinations.ai/openai?seed=${seed}`;
                    
                    const resp = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (resp.ok) return await resp.json();
                    
                    if (resp.status === 429 || resp.status >= 500) {
                        const sleep = 25000 + (i * 15000); // Brute force aggressive retry logic
                        writeLog(`${label}: Server Busy (${resp.status}). Retrying in ${sleep/1000}s...`, "text-amber-500 font-bold");
                        await new Promise(r => setTimeout(r, sleep));
                    }
                } catch (e) {
                    writeLog(`${label}: Connection error. Retrying...`, "text-red-400");
                    await new Promise(r => setTimeout(r, 10000));
                }
            }
            return null;
        }

        window.deployForge = async () => {
            if (isRunning) return;
            const prompt = document.getElementById('promptInput').value.trim();
            if (!prompt) return writeLog("ERROR: Input objective required.", "text-red-400");

            isRunning = true;
            mainDeployBtn.disabled = true;
            mainDeployBtn.innerText = "CLUSTER ACTIVE...";
            
            fleetDisplay.innerHTML = '';
            thoughtGrid.innerHTML = '';
            emptyState.classList.add('hidden');
            verdictSection.classList.add('hidden');
            brainstormingArea.classList.add('hidden');

            let unitCount = 3;
            if (currentMode === "auto") {
                unitCount = prompt.length < 50 ? 1 : prompt.length < 200 ? 3 : 6;
                writeLog(`AUTO-MODE: Selected ${unitCount} units based on complexity.`, "text-blue-400");
            } else if (currentMode === "fast") unitCount = 1;
            else if (currentMode === "deepx") unitCount = 3;
            else if (currentMode === "expert" || currentMode === "net43") unitCount = 6;

            const activeUnits = personalities.slice(0, unitCount);

            // Phase 1: Collaborative Brainstorming (NET 4.3 Only)
            if (currentMode === "net43") {
                brainstormingArea.classList.remove('hidden');
                writeLog("NET 4.3: Initiating Agent Collaborative Brainstorm...", "text-blue-400 font-black");
                
                for (const unit of activeUnits) {
                    const bubble = document.createElement('div');
                    bubble.className = "thought-bubble p-4 rounded-2xl text-[10px] text-slate-400 leading-relaxed";
                    bubble.innerHTML = `<span class="text-blue-400 font-bold uppercase block mb-1">${unit.name} THOUGHTS:</span><div id="thought-${unit.id}">Thinking...</div>`;
                    thoughtGrid.appendChild(bubble);

                    const thoughtResult = await fetchWithBruteRetry({
                        messages: [
                            { role: 'system', content: `You are the ${unit.name}. Analyze this project: ${prompt}. Briefly state your plan to ensure ${unit.focus}. Max 50 words.` }
                        ],
                        model: 'openai'
                    }, `${unit.name}-BRAIN`);

                    if (thoughtResult) {
                        document.getElementById(`thought-${unit.id}`).innerText = thoughtResult.choices[0].message.content;
                    }
                    await new Promise(r => setTimeout(r, 2000));
                }
                writeLog("NET 4.3: Strategy locked. Proceeding to code generation.", "text-emerald-400");
                await new Promise(r => setTimeout(r, 5000));
            }

            // Phase 2: Code Generation
            const results = [];
            for (let i = 0; i < activeUnits.length; i++) {
                if (i > 0) {
                    const delay = 35000; // Increased delay for stability
                    writeLog(`COOLDOWN: Resetting connection channel (${delay/1000}s)...`, "text-slate-600 italic");
                    await new Promise(r => setTimeout(r, delay));
                }

                const unit = activeUnits[i];
                writeLog(currentMode === "net43" ? `NET-EXECUTION: Unit-${unit.id} (${unit.name}) is generating...` : `IGNITING: Unit-${unit.id} (${unit.name})...`, "text-slate-300");
                const res = await spawnAgent(unit, prompt);
                if (res) results.push(res);
            }

            if (results.length > 0) {
                writeLog("SYNC: Judging candidates for master build...", "text-amber-500");
                await new Promise(r => setTimeout(r, 5000));
                await runJudge(prompt, results);
            }

            isRunning = false;
            mainDeployBtn.disabled = false;
            mainDeployBtn.innerText = "Ignite Neural Net";
        };

        async function spawnAgent(unit, prompt) {
            const card = document.createElement('div');
            card.id = `agent-card-${unit.id}`;
            card.className = 'agent-card p-6 rounded-[2rem] flex flex-col gap-4 overflow-hidden';
            card.innerHTML = `
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div id="led-${unit.id}" class="status-led led-active"></div>
                        <span class="text-[10px] font-black text-slate-200 tracking-widest uppercase">${unit.name}</span>
                    </div>
                </div>
                <div class="h-64 overflow-y-auto bg-black/50 p-5 rounded-2xl border border-slate-800/50 code-view">
                    <pre id="agent-text-${unit.id}" class="text-[10px] text-blue-400/40 italic leading-relaxed">Processing neural buffer...</pre>
                </div>
            `;
            fleetDisplay.appendChild(card);

            const result = await fetchWithBruteRetry({
                messages: [
                    { role: 'system', content: `IDENTITY: ${unit.persona}. Output ONLY the complete source code for a single HTML file. No text explanation.` },
                    { role: 'user', content: `Project: ${prompt}` }
                ],
                model: 'openai'
            }, `UNIT-${unit.id}`);

            const display = document.getElementById(`agent-text-${unit.id}`);
            const led = document.getElementById(`led-${unit.id}`);

            if (result && result.choices) {
                const code = result.choices[0].message.content.replace(/```[a-z]*\n/gi, "").replace(/```/g, "").trim();
                display.innerText = code;
                display.className = "text-[10px] text-slate-300 font-mono italic";
                led.className = "status-led bg-emerald-500";
                writeLog(`SUCCESS: Unit-${unit.id} output captured.`, "text-emerald-400");
                return { id: unit.id, code, name: unit.name };
            }

            display.innerText = "[SIGNAL TERMINATED]";
            display.className = "text-[10px] text-red-500 font-bold";
            led.className = "status-led bg-red-500";
            return null;
        }

        async function runJudge(prompt, results) {
            const context = results.map(r => `[UNIT-${r.id}] ${r.code.substring(0, 500)}...`).join('\n\n');
            const judgeRes = await fetchWithBruteRetry({
                messages: [
                    { role: 'system', content: "Return JSON only: { 'winnerId': number, 'reason': 'string' }" },
                    { role: 'user', content: `Objective: ${prompt}\n\nCandidate Snippets:\n${context}` }
                ],
                model: 'openai',
                jsonMode: true
            }, "JUDGE");

            if (judgeRes) {
                try {
                    const data = JSON.parse(judgeRes.choices[0].message.content);
                    const winner = results.find(r => r.id === data.winnerId) || results[0];
                    displayWinner(winner, data);
                } catch(e) { displayWinner(results[0], { reason: "Standard synthesis selected." }); }
            } else {
                displayWinner(results[0], { reason: "Automatic fallback selection." });
            }
        }

        function displayWinner(winner, metadata) {
            verdictSection.classList.remove('hidden');
            document.getElementById('winningUnitLabel').innerText = `MASTER: ${winner.name} (UNIT-00${winner.id})`;
            document.getElementById('verdictText').innerText = metadata.reason;
            document.querySelectorAll('.agent-card').forEach(c => c.style.borderColor = "rgba(71, 85, 105, 0.2)");
            document.getElementById(`agent-card-${winner.id}`).style.borderColor = "#f59e0b";
            winningCode = winner.code;
        }

        document.getElementById('downloadWinnerBtn').onclick = () => {
            const blob = new Blob([winningCode], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `NeuralBuild.html`;
            a.click();
        };
    </script>
</body>
</html>
